# Serve the Astra static bundle and proxy /api/* to the backend service.

# Phase 2.5 — the security header set. NGINX GOTCHA: add_header directives are
# inherited from server{} ONLY by locations that declare none of their own, so
# every location that sets its own header (sw.js, /assets/) must repeat this
# block. Keep the three copies identical.
#   - CSP: the app is self-contained by design (no-external.spec.ts proves no
#     off-origin requests) — everything pins to 'self'. 'wasm-unsafe-eval' is
#     the vendored Swiss-Ephemeris WASM; style 'unsafe-inline' is Vite/React
#     injected styles; data:/blob: images are deck plates & canvas exports;
#     blob: media is stitched TTS audio; geolocation stays available to the
#     app itself for the ceremony's location step.
#   - HSTS is honored only over TLS — inert in plain-HTTP dev, active behind
#     the terminating proxy (Cloudflare/VPS) in production.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Phase 2.5 — request size cap. Every request body is small JSON (birth
    # data, a question string); nothing in the app uploads files. 1m is
    # generous headroom over the largest real payload with no legitimate
    # use case pushing past it.
    client_max_body_size 1m;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # gzip for the text assets (JS/CSS/JSON/SVG).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → FastAPI backend (compose service name "backend"). depends_on with a
    # healthcheck guarantees the upstream is resolvable when nginx starts.
    location /api/ {
        proxy_pass http://backend:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /api/ai-ask-stream is Server-Sent Events — never buffer, allow long-lived.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # PWA service worker must always be revalidated, never long-cached.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        # security headers repeated: this location's add_header cancels inheritance
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=(), usb=()" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        try_files $uri =404;
    }

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        # security headers repeated: this location's add_header cancels inheritance
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=(), usb=()" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        try_files $uri =404;
    }

    # SPA fallback: every other route serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
