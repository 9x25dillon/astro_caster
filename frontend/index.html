<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover lets the app paint under the iOS notch/home-indicator;
         theme.css then insets content with env(safe-area-inset-*). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- iOS standalone: dark status bar to match the void chrome. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0b0f" />
    <!-- EB Garamond for the antique, alchemical typographic voice.
         Self-hosted (public/fonts/) so the app makes zero external requests. -->
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <title>Astrological Analysis Environment</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
