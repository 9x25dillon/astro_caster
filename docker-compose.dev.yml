# Astra — dev stack: hot-reloading backend + Vite dev server on node:20.
# Solves the host "Node 18 too old for Vite 8" problem by running node:20 in a
# container. Source is bind-mounted, so edits reload live.
#   cp .env.example .env
#   docker compose -f docker-compose.dev.yml up --build
# App on http://localhost:${WEB_PORT:-5173} · API docs on http://localhost:8787/docs
name: astra-dev

services:
  backend:
    build:
      context: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8787 --reload
    environment:
      AAE_ENV: development
      AAE_AI_PROVIDER: ${AAE_AI_PROVIDER:-auto}
      # Ollama: OLLAMA_HOST from .env → what the backend reads (AAE_OLLAMA_URL).
      AAE_OLLAMA_URL: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      AAE_OLLAMA_MODEL: ${AAE_OLLAMA_MODEL:-qwen2.5:3b}
      AAE_OLLAMA_MODEL_DEEP: ${AAE_OLLAMA_MODEL_DEEP:-}
      AAE_AI_API_KEY: ${AAE_AI_API_KEY:-}
      AAE_AI_BASE_URL: ${AAE_AI_BASE_URL:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app          # live reload
      - backend-data:/app/data
    ports:
      - "8787:8787"
    restart: unless-stopped

  frontend:
    image: node:20
    working_dir: /app
    # install into the named volume (not the host's node_modules), then serve.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${WEB_PORT:-5173}"
    environment:
      # Vite proxies /api → this target (see frontend/vite.config.ts).
      VITE_API_TARGET: http://backend:8787
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - ./packages:/packages    # @astra/core is imported from ../packages
      - frontend-node-modules:/app/node_modules
    ports:
      # Same host port as prod (WEB_PORT); host==container keeps Vite HMR happy.
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"

volumes:
  backend-data:
  frontend-node-modules:
